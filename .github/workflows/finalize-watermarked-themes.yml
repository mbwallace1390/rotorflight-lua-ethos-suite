name: Finalize watermarked themes
on:
  push:
    branches: [update-watermarked-themes-final]
    paths:
      - .github/workflows/finalize-watermarked-themes.yml
      - .github/scripts/apply_theme_marks.py
  pull_request:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: update-watermarked-themes-final
      - name: Apply theme marks
        run: python .github/scripts/apply_theme_marks.py
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/rfsuite/widgets/dashboard/themes
          if ! git diff --cached --quiet; then
            git commit -m "Add MWRC marks to dashboard themes"
            git push origin HEAD:update-watermarked-themes-final
          fi
